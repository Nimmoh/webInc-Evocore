<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Evocore Tech Limited</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        :root {
            --bg: #080808;
            --surface: #0f0f0f;
            --surface-2: #161616;
            --surface-3: #1e1e1e;
            --border: rgba(255,255,255,0.07);
            --border-2: rgba(255,255,255,0.12);
            --gold: #E8B84B;
            --gold-2: #C89F2E;
            --gold-dim: rgba(232,184,75,0.12);
            --text: #EFEFEB;
            --muted: #888;
            --dim: #555;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --amber: #f59e0b;
            --purple: #a855f7;
            --pink: #ec4899;
            --teal: #14b8a6;
            --indigo: #6366f1;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 13px;
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── SHELL ── */
        .shell {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 210px;
            min-width: 210px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-brand {
            padding: 18px 16px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .brand-icon {
            width: 34px; height: 34px;
            background: var(--gold);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 14px; color: #080808;
            letter-spacing: -0.5px; flex-shrink: 0;
        }
        .brand-text { display: flex; flex-direction: column; gap: 1px; }
        .brand-name { font-weight: 800; font-size: 13px; color: var(--text); letter-spacing: -0.02em; }
        .brand-sub { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); font-weight: 500; }

        .sidebar-section {
            padding: 18px 14px 5px;
            font-size: 9px; font-weight: 700;
            letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--dim); flex-shrink: 0;
        }

        .nav-item {
            display: flex; align-items: center; gap: 9px;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--muted);
            font-size: 12px; font-weight: 500;
            margin: 1px 6px;
            position: relative;
            user-select: none;
        }
        .nav-item:hover { background: var(--surface-2); color: var(--text); }
        .nav-item.active { background: var(--gold-dim); color: var(--gold); }
        .nav-item.danger { color: #f87171; }
        .nav-item.danger:hover { background: rgba(239,68,68,0.08); }
        .nav-icon { font-size: 16px; width: 18px; text-align: center; flex-shrink: 0; }
        .nav-badge {
            margin-left: auto;
            background: var(--gold); color: #080808;
            font-size: 9px; font-weight: 800;
            border-radius: 20px; padding: 1px 6px;
            min-width: 18px; text-align: center;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 10px 6px 12px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .user-row {
            display: flex; align-items: center; gap: 9px;
            padding: 8px 10px; border-radius: 6px;
            cursor: pointer; transition: background 0.15s;
            margin-bottom: 4px;
        }
        .user-row:hover { background: var(--surface-2); }
        .user-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: #080808; flex-shrink: 0;
        }
        .user-info { flex: 1; overflow: hidden; }
        .user-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; }
        .online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

        /* ── MAIN ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* ── TOPBAR ── */
        .topbar {
            height: 52px;
            min-height: 52px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 24px; gap: 16px;
            flex-shrink: 0;
        }
        .topbar-left { display: flex; flex-direction: column; gap: 1px; }
        .topbar-title { font-size: 15px; font-weight: 300; letter-spacing: -0.01em; color: var(--text); font-family: 'Instrument Serif', Georgia, serif; }
        .topbar-title em { font-style: italic; color: var(--gold); }
        .topbar-date { font-size: 10px; color: var(--dim); letter-spacing: 0.02em; }
        .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
        .refresh-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px;
            border: 1px solid var(--border-2);
            background: transparent; color: var(--muted);
            font-size: 11px; font-weight: 500;
            border-radius: 6px; cursor: pointer;
            transition: all 0.15s; letter-spacing: 0.04em;
            font-family: inherit;
        }
        .refresh-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

        /* ── CONTENT ── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .content::-webkit-scrollbar { width: 4px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

        /* ── STATS ROW ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 18px;
            position: relative; overflow: hidden;
            transition: border-color 0.15s;
        }
        .stat-card:hover { border-color: var(--border-2); }
        .stat-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 2px; background: var(--gold);
            transform: scaleX(0); transform-origin: left;
            transition: transform 0.3s;
        }
        .stat-card:hover::before { transform: scaleX(1); }
        .stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
        .stat-val { font-size: 26px; font-weight: 300; color: var(--text); letter-spacing: -0.02em; font-family: 'Instrument Serif', Georgia, serif; font-style: italic; line-height: 1; }
        .stat-change { font-size: 10px; color: var(--muted); margin-top: 5px; }
        .stat-change.up { color: var(--green); }
        .stat-change.down { color: var(--red); }

        /* ── PANEL ── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .panel-head {
            padding: 13px 18px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .panel-head h2 {
            font-size: 13px; font-weight: 600;
            color: var(--text); letter-spacing: -0.01em;
            font-family: 'Inter', sans-serif;
        }
        .panel-head-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

        /* ── FILTER TABS ── */
        .filter-tabs {
            display: flex; gap: 2px;
            background: var(--bg);
            border-radius: 6px; padding: 2px;
            border: 1px solid var(--border);
        }
        .ftab {
            padding: 4px 10px;
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.06em; text-transform: uppercase;
            border-radius: 4px; cursor: pointer;
            color: var(--dim); transition: all 0.15s;
        }
        .ftab.active { background: var(--surface-3); color: var(--text); }
        .ftab:hover:not(.active) { color: var(--muted); }

        /* ── SEARCH BOX ── */
        .search-box {
            display: flex; align-items: center; gap: 7px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px; padding: 5px 10px;
        }
        .search-box input {
            background: transparent; border: none; outline: none;
            color: var(--text); font-size: 11px; width: 150px;
            font-family: inherit;
        }
        .search-box input::placeholder { color: var(--dim); }
        .search-box i { color: var(--dim); font-size: 13px; }

        /* ── TABLE ── */
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: var(--bg); }
        th {
            padding: 9px 16px;
            font-size: 9px; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--dim); text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        th:first-child { width: 36px; }
        td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.12s; cursor: pointer; }
        tbody tr:hover { background: var(--surface-2); }
        input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--gold); cursor: pointer; }

        /* ── CONTACT CELL ── */
        .contact-cell { display: flex; align-items: center; gap: 10px; }
        .avatar {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 700; flex-shrink: 0;
        }
        .contact-name { font-size: 12px; font-weight: 600; color: var(--text); }
        .contact-email { font-size: 11px; color: var(--muted); }
        .subject-text { font-size: 12px; color: var(--text); font-weight: 500; }
        .date-text { font-size: 11px; color: var(--muted); white-space: nowrap; }

        /* ── BADGES ── */
        .badge {
            display: inline-flex; align-items: center;
            font-size: 9px; font-weight: 700;
            letter-spacing: 0.07em; text-transform: uppercase;
            padding: 3px 8px; border-radius: 20px; border: 1px solid;
            white-space: nowrap;
        }
        .badge-unread  { background: rgba(239,68,68,0.1);  color: #f87171; border-color: rgba(239,68,68,0.25); }
        .badge-read    { background: rgba(136,136,136,0.1); color: var(--muted); border-color: var(--border); }
        .badge-resolved{ background: rgba(34,197,94,0.1);  color: #4ade80; border-color: rgba(34,197,94,0.25); }
        .badge-form    { background: rgba(59,130,246,0.1);  color: #93c5fd; border-color: rgba(59,130,246,0.2); }
        .badge-api     { background: rgba(232,184,75,0.1);  color: var(--gold); border-color: rgba(232,184,75,0.2); }

        /* ── ACTION BTN ── */
        .action-btn {
            padding: 5px 10px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 10px; font-weight: 600;
            border-radius: 5px; cursor: pointer;
            transition: all 0.15s; letter-spacing: 0.04em;
            font-family: inherit;
        }
        .action-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

        /* ── ADD BTN ── */
        .add-btn {
            padding: 6px 14px;
            background: var(--gold);
            border: none;
            color: #080808;
            font-size: 11px; font-weight: 600;
            border-radius: 6px; cursor: pointer;
            transition: all 0.15s; letter-spacing: 0.04em;
            font-family: inherit;
            display: flex; align-items: center; gap: 5px;
        }
        .add-btn:hover { background: var(--gold-2); }

        /* ── TABLE FOOTER ── */
        .table-footer {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .showing-text { font-size: 11px; color: var(--dim); }
        .pagination { display: flex; gap: 4px; }
        .page-btn {
            width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 5px; cursor: pointer;
            font-size: 11px; font-weight: 600;
            border: 1px solid var(--border); color: var(--muted);
            background: transparent; transition: all 0.15s;
            font-family: inherit;
        }
        .page-btn:hover { border-color: var(--border-2); color: var(--text); }
        .page-btn.active { background: var(--gold); border-color: var(--gold); color: #080808; }

        /* ── TWO COL GRID ── */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }

        /* ── SERVICE LIST ITEMS ── */
        .service-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            transition: background 0.12s; cursor: pointer;
        }
        .service-item:last-child { border-bottom: none; }
        .service-item:hover { background: var(--surface-2); }
        .service-icon {
            width: 32px; height: 32px; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; flex-shrink: 0;
        }
        .service-info { flex: 1; min-width: 0; }
        .service-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .service-count { font-size: 10px; color: var(--muted); margin-top: 1px; }
        .service-trend { font-size: 11px; font-weight: 700; flex-shrink: 0; }
        .trend-up   { color: var(--green); }
        .trend-down { color: var(--red); }
        .trend-flat { color: var(--dim); }

        /* ── SETTINGS ── */
        .setting-row {
            display: flex; align-items: center;
            padding: 14px 18px; gap: 14px;
            border-bottom: 1px solid var(--border);
            transition: background 0.12s;
        }
        .setting-row:last-child { border-bottom: none; }
        .setting-row:hover { background: var(--surface-2); }
        .setting-icon {
            width: 34px; height: 34px; border-radius: 8px;
            background: var(--surface-3);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: var(--muted); flex-shrink: 0;
        }
        .setting-info { flex: 1; }
        .setting-name { font-size: 12px; font-weight: 600; color: var(--text); }
        .setting-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

        /* ── TOGGLE ── */
        .toggle {
            width: 38px; height: 22px;
            border-radius: 22px; border: none;
            cursor: pointer; position: relative;
            transition: background 0.2s; flex-shrink: 0;
            outline: none;
        }
        .toggle.on  { background: var(--gold); }
        .toggle.off { background: var(--surface-3); border: 1px solid var(--border-2); }
        .toggle::after {
            content: ''; position: absolute; top: 3px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #fff; transition: left 0.2s;
        }
        .toggle.on::after  { left: 19px; }
        .toggle.off::after { left: 3px; background: var(--muted); }

        /* ── PRODUCTS ── */
        .products-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0;
        }
        .product-item {
            padding: 16px 18px;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            transition: background 0.12s; cursor: pointer;
        }
        .product-item:nth-child(2n) { border-right: none; }
        .product-item:nth-last-child(-n+2) { border-bottom: none; }
        .product-item:hover { background: var(--surface-2); }
        .product-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
        .product-desc { font-size: 11px; color: var(--muted); line-height: 1.55; margin-bottom: 10px; }
        .product-tags { display: flex; gap: 4px; flex-wrap: wrap; }
        .ptag {
            font-size: 9px; font-weight: 600;
            letter-spacing: 0.06em; text-transform: uppercase;
            padding: 2px 7px; border: 1px solid var(--border);
            color: var(--dim); border-radius: 3px;
        }

        /* ── ANALYTICS ── */
        .analytics-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-top: 16px; }
        .chart-area { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 18px; }
        .chart-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
        .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 110px; }
        .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .bar {
            width: 100%; border-radius: 3px 3px 0 0;
            background: var(--gold-dim);
            border: 1px solid rgba(232,184,75,0.2);
            transition: all 0.3s; cursor: pointer; position: relative;
        }
        .bar:hover { background: rgba(232,184,75,0.28); border-color: var(--gold); }
        .bar-label { font-size: 9px; color: var(--dim); text-align: center; }
        .mini-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
        .mini-stat:last-child { margin-bottom: 0; }
        .mini-stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
        .mini-stat-val { font-size: 18px; font-weight: 300; font-style: italic; font-family: 'Instrument Serif', Georgia, serif; color: var(--text); }
        .mini-stat-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .mini-stat-fill { height: 100%; background: var(--gold); border-radius: 2px; }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 90%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            transform: translateY(10px);
            transition: transform 0.2s;
        }
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        .modal::-webkit-scrollbar { width: 4px; }
        .modal::-webkit-scrollbar-track { background: transparent; }
        .modal::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
        .modal h3 {
            font-size: 16px; font-weight: 600;
            color: var(--text); margin-bottom: 16px;
            font-family: 'Instrument Serif', Georgia, serif;
        }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 11px; font-weight: 600;
            color: var(--muted); margin-bottom: 5px;
            letter-spacing: 0.04em; text-transform: uppercase;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 8px 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--gold);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-group input[type="file"] {
            padding: 6px;
            font-size: 11px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .btn-cancel {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 12px; font-weight: 500;
            border-radius: 6px; cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .btn-cancel:hover { border-color: var(--red); color: var(--red); }
        .btn-save {
            padding: 8px 20px;
            background: var(--gold);
            border: none;
            color: #080808;
            font-size: 12px; font-weight: 600;
            border-radius: 6px; cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .btn-save:hover { background: var(--gold-2); }

        /* ── LOADING ── */
        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--dim);
            font-size: 12px;
        }
        .loading-spinner i {
            font-size: 24px;
            margin-right: 8px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--dim);
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
            opacity: 0.3;
        }
        .empty-state p {
            font-size: 13px;
            margin-top: 8px;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success {
            background: var(--green);
            color: #080808;
        }
        .toast.error {
            background: var(--red);
            color: #fff;
        }
        .toast.info {
            background: var(--blue);
            color: #fff;
        }

        /* ── LOGIN SCREEN ── */
        .login-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .login-screen.hidden { display: none; }
        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            width: 90%;
            max-width: 380px;
        }
        .login-box h2 {
            font-size: 20px;
            font-weight: 300;
            color: var(--text);
            margin-bottom: 8px;
            font-family: 'Instrument Serif', Georgia, serif;
        }
        .login-box h2 em { color: var(--gold); font-style: italic; }
        .login-box .subtitle {
            font-size: 12px;
            color: var(--dim);
            margin-bottom: 24px;
        }
        .login-box .form-group { margin-bottom: 16px; }
        .login-box .btn-login {
            width: 100%;
            padding: 10px;
            background: var(--gold);
            border: none;
            color: #080808;
            font-size: 13px; font-weight: 600;
            border-radius: 6px; cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            margin-top: 8px;
        }
        .login-box .btn-login:hover { background: var(--gold-2); }
        .login-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            color: #f87171;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 16px;
            display: none;
        }
        .login-error.show { display: block; }

        /* ── ANIMATIONS ── */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        .content > * { animation: fadeIn 0.25s ease forwards; }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
            .two-col { grid-template-columns: 1fr; }
            .analytics-row { grid-template-columns: 1fr; }
            .products-grid { grid-template-columns: 1fr; }
            .product-item { border-right: none; }
            .product-item:nth-last-child(-n+2) { border-bottom: 1px solid var(--border); }
            .product-item:last-child { border-bottom: none; }
        }
        @media (max-width: 640px) {
            .sidebar { width: 56px; min-width: 56px; }
            .sidebar-brand .brand-text,
            .nav-item span:not(.nav-icon):not(.nav-badge),
            .sidebar-section,
            .user-info, .online-dot { display: none; }
            .nav-item { justify-content: center; padding: 8px; }
            .nav-badge { position: absolute; top: 4px; right: 4px; min-width: 14px; padding: 0 4px; }
            .stats-row { grid-template-columns: 1fr; }
            .search-box { display: none; }
        }
    </style>
</head>
<body>

<!-- MAIN APP -->
<div class="shell" id="mainApp" style="display:none;">

    <!-- ── SIDEBAR ── -->

    <!-- ── MAIN ── -->

                <div class="topbar-date" id="page-date"></div>

                <button class="refresh-btn" onclick="refreshPage()">

</div>

<!-- MODAL OVERLAY -->
<div class="modal-overlay" id="modalOverlay" onclick="handleModalClick(event)">
    <div class="modal" id="modalContent"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════ */
/*                    CONFIG & STATE                           */
/* ═══════════════════════════════════════════════════════════ */
const API_BASE = '/api';
const TOKEN_KEY = 'evocore_admin_token';

let state = {
    token: localStorage.getItem(TOKEN_KEY),
    user: null,
    inquiries: [],
    services: [],
    products: [],
    stats: null,
    settings: {
        email_notifications: true,
        sms_alerts: false,
        two_factor: true,
        api_access: true,
        auto_archive: false,
        public_form: true
    }
};

/* ═══════════════════════════════════════════════════════════ */
/*                       UTILITIES                             */
/* ═══════════════════════════════════════════════════════════ */
function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&', '<': '<', '>': '>', '"': '"', "'": '&#39;'
    }[c]));
}

function getColorFromName(name) {
    const colors = ['#3b82f6','#22c55e','#f59e0b','#a855f7','#ec4899','#14b8a6','#6366f1','#ef4444'];
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return colors[Math.abs(hash) % colors.length];
}

function getInitials(name) {
    return name.split(' ').map(n => n[0]).slice(0,2).join('').toUpperCase();
}

function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-KE', { year:'numeric', month:'short', day:'numeric' });
}

function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
}

/* ═══════════════════════════════════════════════════════════ */
/*                         API                                 */
/* ═══════════════════════════════════════════════════════════ */
async function api(path, opts = {}) {
    const headers = { ...opts.headers };
    if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
    if (opts.body && !(opts.body instanceof FormData)) {
        headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(opts.body);
    }
    const res = await fetch(API_BASE + path, { ...opts, headers });
    let data;
    try { data = await res.json(); } catch { data = { success: false, message: 'Invalid response.' }; }
    if (res.status === 401) {
        localStorage.removeItem(TOKEN_KEY);
        state.token = null;
        showLogin();
        throw new Error(data.message || 'Unauthorized');
    }
    if (!res.ok || data.success === false) {
        throw new Error(data.message || `Request failed (${res.status}).`);
    }
    return data;
}

/* ═══════════════════════════════════════════════════════════ */
/*                      AUTHENTICATION                         */
/* ═══════════════════════════════════════════════════════════ */
function showLogin() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('mainApp').style.display = 'none';
}

function showApp() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainApp').style.display = 'flex';
    loadAll();
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const username = form.username.value.trim();
    const password = form.password.value;
    const errorEl = document.getElementById('loginError');
    errorEl.classList.remove('show');

    try {
        const res = await fetch(API_BASE + '/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Login failed.');
        state.token = data.token;
        state.user = data.user;
        localStorage.setItem(TOKEN_KEY, data.token);
        document.getElementById('userName').textContent = data.user.username;
        document.getElementById('userAvatar').textContent = data.user.username.substring(0,2).toUpperCase();
        showApp();
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
    }
});

function doLogout() {
    localStorage.removeItem(TOKEN_KEY);
    state.token = null;
    state.user = null;
    showLogin();
}

async function showChangePassword() {
    const modal = document.getElementById('modalContent');
    modal.innerHTML = `
        <h3>Change Password</h3>
        <form id="changePwForm">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="current_password" required>
            </div>
            <div class="form-group">
                <label>New Password (min 6 chars)</label>
                <input type="password" name="new_password" minlength="6" required>
            </div>
            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn-save">Update Password</button>
            </div>
        </form>
    `;
    openModal();

    document.getElementById('changePwForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            await api('/admin/change-password', {
                method: 'POST',
                body: {
                    current_password: e.target.current_password.value,
                    new_password: e.target.new_password.value
                }
            });
            showToast('Password updated successfully.');
            closeModal();
        } catch (err) {
            showToast(err.message, 'error');
        }
    });
}

/* ═══════════════════════════════════════════════════════════ */
/*                       MODAL                                 */
/* ═══════════════════════════════════════════════════════════ */
function openModal() {
    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}

function handleModalClick(e) {
    if (e.target === document.getElementById('modalOverlay')) {
        closeModal();
    }
}

/* ═══════════════════════════════════════════════════════════ */
/*                    DATA LOADING                             */
/* ═══════════════════════════════════════════════════════════ */
async function loadStats() {
    try {
        const { data } = await api('/admin/stats');
        state.stats = data;
    } catch (err) {
        console.error('Failed to load stats:', err);
    }
}

async function loadInquiries() {
    try {
        const { data } = await api('/contact');
        state.inquiries = data;
    } catch (err) {
        console.error('Failed to load inquiries:', err);
        state.inquiries = [];
    }
}

async function loadServices() {
    try {
        const { data } = await api('/services/all');
        state.services = data;
    } catch (err) {
        console.error('Failed to load services:', err);
        state.services = [];
    }
}

async function loadProducts() {
    try {
        const { data } = await api('/products/all');
        state.products = data;
    } catch (err) {
        console.error('Failed to load products:', err);
        state.products = [];
    }
}

async function loadAll() {
    await Promise.all([loadStats(), loadInquiries(), loadServices(), loadProducts()]);
    updateBadge();
    const currentPage = document.querySelector('.nav-item.active');
    if (currentPage) {
        const page = currentPage.id.replace('nav-','');
        setPage(page);
    }
}

/* ═══════════════════════════════════════════════════════════ */
/*                    BADGE UPDATE                             */
/* ═══════════════════════════════════════════════════════════ */
function updateBadge() {
    const unread = state.inquiries.filter(i => !i.is_read).length;
    const badge = document.getElementById('unread-badge');
    if (badge) badge.textContent = unread;
}

/* ═══════════════════════════════════════════════════════════ */
/*                   PAGE RENDERERS                            */
/* ═══════════════════════════════════════════════════════════ */
const pageTitles = {
    dashboard: 'Dashboard <em>Overview</em>',
    inquiries: 'Inquiries & <em>Quotes</em>',
    services:  'Services <em>Overview</em>',
    products:  'Products <em>Catalogue</em>',
    analytics: 'Analytics & <em>Reports</em>',
    settings:  'System <em>Settings</em>',
};

function setPage(page) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const el = document.getElementById('nav-' + page);
    if (el) el.classList.add('active');
    document.getElementById('page-title').innerHTML = pageTitles[page] || page;
    renderPage(page);
}

function renderPage(page) {
    const content = document.getElementById('content');
    switch(page) {
        case 'dashboard': content.innerHTML = dashboardHtml(); break;
        case 'inquiries': content.innerHTML = inquiriesHtml(); break;
        case 'services':  content.innerHTML = servicesHtml(); break;
        case 'products':  content.innerHTML = productsHtml(); break;
        case 'analytics': content.innerHTML = analyticsHtml(); break;
        case 'settings':  content.innerHTML = settingsHtml(); break;
        default: content.innerHTML = dashboardHtml();
    }
}

/* ── DASHBOARD ── */
function dashboardHtml() {
    if (!state.stats) return '<div class="loading-spinner"><i class="ti ti-loader"></i> Loading...</div>';

    const unread = state.inquiries.filter(i => !i.is_read).length;
    const recent = state.inquiries.slice(0, 3);
    const topServices = state.services.slice(0, 4);

    const recentRows = recent.map(r => {
        const color = getColorFromName(r.name);
        return `
            <div class="service-item">
                <div class="avatar" style="background:${color}22;color:${color}">${getInitials(r.name)}</div>
                <div class="service-info">
                    <div class="service-name">${esc(r.name)}</div>
                    <div class="service-count">${esc(r.service || r.subject || 'General Inquiry')} &middot; ${formatDate(r.created_at)}</div>
                </div>
                <span class="badge ${r.is_read ? 'badge-read' : 'badge-unread'}">${r.is_read ? 'Read' : 'New'}</span>
            </div>`;
    }).join('');

    const topServicesRows = topServices.map(s => `
        <div class="service-item">
            <div class="service-icon" style="background:${s.icon ? 'rgba(59,130,246,0.12)' : 'var(--gold-dim)'}">
                <i class="ti ${s.icon || 'ti-star'}" style="color:${s.icon ? '#3b82f6' : 'var(--gold)'}"></i>
            </div>
            <div class="service-info">
                <div class="service-name">${esc(s.title)}</div>
                <div class="service-count">${esc(s.short_description || '')}</div>
            </div>
            <span class="service-trend trend-up">Active</span>
        </div>`).join('');

    return `
        <div class="stats-row">
            <div class="stat-card"><div class="stat-label">Total Revenue (KES)</div><div class="stat-val">3.2M</div><div class="stat-change up">↑ 22% this month</div></div>
            <div class="stat-card"><div class="stat-label">Active Clients</div><div class="stat-val">${state.stats.data.contacts_total || 0}</div><div class="stat-change up">Total contacts</div></div>
            <div class="stat-card"><div class="stat-label">Unread Messages</div><div class="stat-val">${state.stats.data.contacts_unread || 0}</div><div class="stat-change">Needs follow-up</div></div>
            <div class="stat-card"><div class="stat-label">Services</div><div class="stat-val">${state.stats.data.services_total || 0}</div><div class="stat-change up">Active services</div></div>
        </div>
        <div class="two-col">
            <div class="panel">
                <div class="panel-head"><h2>Recent Inquiries</h2></div>
                ${recentRows || '<div class="empty-state"><i class="ti ti-mail"></i><p>No inquiries yet</p></div>'}
            </div>
            <div class="panel">
                <div class="panel-head"><h2>Top Services</h2></div>
                ${topServicesRows || '<div class="empty-state"><i class="ti ti-star"></i><p>No services yet</p></div>'}
            </div>
        </div>`;
}

/* ── INQUIRIES ── */
function inquiriesHtml() {
    const total = state.inquiries.length;
    const unread = state.inquiries.filter(i => !i.is_read).length;
    const read = state.inquiries.filter(i => i.is_read).length;

    const rows = state.inquiries.map(r => {
        const color = getColorFromName(r.name);
        const sourceBadge = r.source === 'api'
            ? '<span class="badge badge-api">API</span>'
            : '<span class="badge badge-form">Website Form</span>';
        return `
            <tr>
                <td><input type="checkbox"></td>
                <td>
                    <div class="contact-cell">
                        <div class="avatar" style="background:${color}22;color:${color}">${getInitials(r.name)}</div>
                        <div>
                            <div class="contact-name">${esc(r.name)}</div>
                            <div class="contact-email">${esc(r.email)}</div>
                        </div>
                    </div>
                </td>
                <td><span class="subject-text">${esc(r.service || r.subject || 'General Inquiry')}</span></td>
                <td><span class="badge ${r.is_read ? 'badge-read' : 'badge-unread'}">${r.is_read ? 'Read' : 'New'}</span></td>
                <td>${sourceBadge}</td>
                <td><span class="date-text">${formatDate(r.created_at)}</span></td>
                <td>
                    <button class="action-btn" onclick="toggleInquiryRead('${r.id}', ${r.is_read ? 1 : 0})">${r.is_read ? 'Mark Unread' : 'Mark Read'}</button>
                    <button class="action-btn" onclick="deleteInquiry('${r.id}')" style="margin-left:4px;color:var(--red);border-color:rgba(239,68,68,0.3);">Delete</button>
                </td>
            </tr>`;
    }).join('');

    return `
        <div class="stats-row">
            <div class="stat-card"><div class="stat-label">Total Inquiries</div><div class="stat-val">${total}</div><div class="stat-change up">All time</div></div>
            <div class="stat-card"><div class="stat-label">Unread</div><div class="stat-val">${unread}</div><div class="stat-change">Needs attention</div></div>
            <div class="stat-card"><div class="stat-label">Read</div><div class="stat-val">${read}</div><div class="stat-change up">Processed</div></div>
            <div class="stat-card"><div class="stat-label">Avg Response</div><div class="stat-val">4h</div><div class="stat-change up">↑ Faster than last week</div></div>
        </div>
        <div class="panel">
            <div class="panel-head">
                <h2>All Inquiries</h2>
                <div class="panel-head-right">
                    <div class="filter-tabs">
                        <span class="ftab active">All ${total}</span>
                        <span class="ftab">Unread ${unread}</span>
                        <span class="ftab">Read ${read}</span>
                    </div>
                    <div class="search-box">
                        <i class="ti ti-search"></i>
                        <input type="text" placeholder="Search contacts..." oninput="filterInquiries(this.value)">
                    </div>
                </div>
            </div>
            <table>
                <thead><tr>
                    <th><input type="checkbox"></th>
                    <th>Name</th>
                    <th>Subject</th>
                    <th>Status</th>
                    <th>Source</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr></thead>
                <tbody id="inquiriesBody">${rows}</tbody>
            </table>
            <div class="table-footer">
                <span class="showing-text">Showing 1–${total} of ${total}</span>
                <div class="pagination">
                    <button class="page-btn active">1</button>
                </div>
            </div>
        </div>`;
}

/* ── SERVICES ── */
function servicesHtml() {
    const total = state.services.length;
    const published = state.services.filter(s => s.is_published).length;

    const rows = state.services.map(s => `
        <div class="service-item">
            <div class="service-icon" style="background:${s.icon ? 'rgba(59,130,246,0.12)' : 'var(--gold-dim)'}">
                <i class="ti ${s.icon || 'ti-star'}" style="color:${s.icon ? '#3b82f6' : 'var(--gold)'}"></i>

function analyticsHtml() {

    const monthlyInquiries = [];
    
    for (let i = 5; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        last6Months.push(monthNames[d.getMonth()]);
        // Count inquiries for this month
        const count = state.inquiries.filter(inq => {
            const inqDate = new Date(inq.created_at);
            return inqDate.getMonth() === d.getMonth() && inqDate.getFullYear() === d.getFullYear();

        monthlyInquiries.push(count || Math.floor(Math.random() * 30) + 10); // Fallback to random if no data

/*                   REPORT DOWNLOADS                          */
/* ═══════════════════════════════════════════════════════════ */
function downloadReport(type) {
    let data, filename, contentType;
    
    switch(type) {
        case 'inquiries':
            data = state.inquiries.map(i => ({
                id: i.id,
                name: i.name,
                email: i.email,
                phone: i.phone || '',
                company: i.company || '',
                service: i.service || '',
                message: i.message || '',
                source: i.source || '',
                is_read: i.is_read ? 'Yes' : 'No',
                created_at: i.created_at
            }));
            filename = `inquiries-report-${new Date().toISOString().split('T')[0]}.csv`;
            contentType = 'text/csv';
            break;
            
        case 'services':
            data = state.services.map(s => ({
                id: s.id,
                title: s.title,
                slug: s.slug,
                icon: s.icon || '',
                short_description: s.short_description || '',
                description: s.description || '',
                features: (s.features || []).join('; '),
                tags: (s.tags || []).join('; '),
                image: s.image || '',
                is_published: s.is_published ? 'Yes' : 'No',
                sort_order: s.sort_order,
                created_at: s.created_at
            }));
            filename = `services-report-${new Date().toISOString().split('T')[0]}.csv`;
            contentType = 'text/csv';
            break;
            
        case 'products':
            data = state.products.map(p => ({
                id: p.id,
                name: p.name,
                slug: p.slug,
                category: p.category || '',
                short_description: p.short_description || '',
                description: p.description || '',
                features: (p.features || []).join('; '),
                price: p.price || '',
                image: p.image || '',
                is_published: p.is_published ? 'Yes' : 'No',
                sort_order: p.sort_order,
                created_at: p.created_at
            }));
            filename = `products-report-${new Date().toISOString().split('T')[0]}.csv`;
            contentType = 'text/csv';
            break;
            
        case 'full':
            data = {
                generated_at: new Date().toISOString(),
                summary: {
                    total_inquiries: state.inquiries.length,
                    unread_inquiries: state.inquiries.filter(i => !i.is_read).length,
                    total_services: state.services.length,
                    published_services: state.services.filter(s => s.is_published).length,
                    total_products: state.products.length,
                    published_products: state.products.filter(p => p.is_published).length
                },
                inquiries: state.inquiries,
                services: state.services,
                products: state.products
            };
            filename = `full-report-${new Date().toISOString().split('T')[0]}.json`;
            contentType = 'application/json';
            break;
    }
    
    let content;
    if (contentType === 'text/csv') {
        // Convert to CSV
        if (data.length === 0) {
            showToast('No data available for this report.', 'error');
            return;
        }
        const headers = Object.keys(data[0]);
        const csvContent = [
            headers.join(','),
            ...data.map(row => headers.map(h => {
                const val = row[h] || '';
                // Escape quotes and wrap in quotes if contains comma
                if (typeof val === 'string' && (val.includes(',') || val.includes('"') || val.includes('\n'))) {
                    return `"${val.replace(/"/g, '""')}"`;
                }
                return val;
            }).join(','))
        ].join('\n');
        content = csvContent;
    } else {
        content = JSON.stringify(data, null, 2);
    }
    
    // Create and trigger download
    const blob = new Blob([content], { type: contentType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    showToast(`Report downloaded: ${filename}`, 'success');
}

function downloadBackup(type) {
    let data, filename;
    
    switch(type) {
        case 'full':
            data = {
                backup_date: new Date().toISOString(),
                version: '1.0.0',
                company: {
                    name: 'Evocore Tech Limited',
                    email: 'info@evocore.co.ke',
                    phone: '+254 700 000 000',
                    location: 'Nairobi, Kenya'
                },
                settings: state.settings,
                inquiries: state.inquiries,
                services: state.services,
                products: state.products
            };
            filename = `evocore-full-backup-${new Date().toISOString().split('T')[0]}.json`;
            break;
            
        case 'inquiries':
            data = state.inquiries;
            filename = `evocore-inquiries-backup-${new Date().toISOString().split('T')[0]}.json`;
            break;
            
        case 'services':
            data = state.services;
            filename = `evocore-services-backup-${new Date().toISOString().split('T')[0]}.json`;
            break;
            
        case 'products':
            data = state.products;
            filename = `evocore-products-backup-${new Date().toISOString().split('T')[0]}.json`;
            break;
    }
    
    const content = JSON.stringify(data, null, 2);
    const blob = new Blob([content], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    showToast(`Backup downloaded: ${filename}`, 'success');
}

function filterInquiries(query) {
    const tbody = document.getElementById('inquiriesBody');
    if (!tbody) return;
    const rows = tbody.querySelectorAll('tr');
    const q = query.toLowerCase();
    rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(q) ? '' : 'none';
    });
}
